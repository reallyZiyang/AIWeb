<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 网页游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #0f0f23;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 500px;
            width: 100%;
            background: #1e1e3f;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            color: #e94560;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .scores {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: #2a2a5a;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            min-width: 80px;
        }

        .score-label {
            font-size: 12px;
            color: #a0a0a0;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
        }

        .grid-container {
            background: #2a2a5a;
            border-radius: 8px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .grid-cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            transition: all 0.15s ease;
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 28px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 28px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 28px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 22px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 22px; }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: #e94560;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #ff6b8a;
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .leaderboard {
            background: #2a2a5a;
            border-radius: 8px;
            padding: 15px;
        }

        .leaderboard h3 {
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .leaderboard-list {
            list-style: none;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #a0a0a0;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .leaderboard-rank {
            color: #e94560;
            font-weight: bold;
            width: 30px;
        }

        .leaderboard-score {
            color: #ffffff;
            font-weight: bold;
        }

        .leaderboard-date {
            color: #666;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1e1e3f;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal-title {
            color: #e94560;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .modal-score {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 30px;
        }

        /* 动画 */
        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .tile-new {
            animation: appear 0.2s ease;
        }

        .tile-merged {
            animation: pop 0.2s ease;
        }

        /* 移动端适配 */
        @media (max-width: 500px) {
            .game-container {
                padding: 20px;
            }

            .title {
                font-size: 36px;
            }

            .grid-container {
                padding: 8px;
                gap: 8px;
            }

            .grid-cell {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">2048</div>
            <div class="scores">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
        </div>

        <div class="grid-container" id="grid">
            <!-- 16 个格子 -->
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="new-game-btn">新游戏</button>
        </div>

        <div class="leaderboard">
            <h3>🏆 排行榜</h3>
            <ul class="leaderboard-list" id="leaderboard">
                <li class="leaderboard-item">
                    <span>暂无记录</span>
                </li>
            </ul>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="modal" id="game-over-modal">
        <div class="modal-content">
            <div class="modal-title">游戏结束</div>
            <div class="modal-score">最终分数: <span id="final-score">0</span></div>
            <button class="btn btn-primary" id="play-again-btn">再来一局</button>
        </div>
    </div>

    <script>
        // 游戏状态
        const GRID_SIZE = 4;
        let grid = [];
        let score = 0;
        let bestScore = 0;
        let isAnimating = false;

        // DOM 元素
        const gridElement = document.getElementById('grid');
        const scoreElement = document.getElementById('score');
        const bestScoreElement = document.getElementById('best-score');
        const leaderboardElement = document.getElementById('leaderboard');
        const newGameBtn = document.getElementById('new-game-btn');
        const gameOverModal = document.getElementById('game-over-modal');
        const finalScoreElement = document.getElementById('final-score');
        const playAgainBtn = document.getElementById('play-again-btn');

        // 初始化
        function init() {
            loadBestScore();
            loadLeaderboard();
            newGame();
            setupEventListeners();
        }

        // 设置事件监听
        function setupEventListeners() {
            // 键盘事件
            document.addEventListener('keydown', handleKeyDown);

            // 触摸事件
            let touchStartX = 0;
            let touchStartY = 0;

            document.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            document.addEventListener('touchend', (e) => {
                if (isAnimating) return;

                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;

                const diffX = touchEndX - touchStartX;
                const diffY = touchEndY - touchStartY;

                const minSwipe = 50;

                if (Math.abs(diffX) > Math.abs(diffY)) {
                    if (Math.abs(diffX) > minSwipe) {
                        if (diffX > 0) moveRight();
                        else moveLeft();
                    }
                } else {
                    if (Math.abs(diffY) > minSwipe) {
                        if (diffY > 0) moveDown();
                        else moveUp();
                    }
                }
            });

            // 按钮事件
            newGameBtn.addEventListener('click', newGame);
            playAgainBtn.addEventListener('click', () => {
                gameOverModal.classList.remove('show');
                newGame();
            });
        }

        // 键盘处理
        function handleKeyDown(e) {
            if (isAnimating) return;

            switch(e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    moveUp();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    moveDown();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    moveLeft();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    moveRight();
                    break;
            }
        }

        // 新游戏
        function newGame() {
            grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(0));
            score = 0;
            updateScore();
            addRandomTile();
            addRandomTile();
            renderGrid();
            gameOverModal.classList.remove('show');
        }

        // 添加随机块
        function addRandomTile() {
            const emptyCells = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] === 0) {
                        emptyCells.push({ r, c });
                    }
                }
            }

            if (emptyCells.length > 0) {
                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
                return { r, c };
            }
            return null;
        }

        // 渲染网格
        function renderGrid(newTilePos = null, mergedTiles = []) {
            gridElement.innerHTML = '';

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';

                    const value = grid[r][c];
                    if (value > 0) {
                        cell.textContent = formatNumber(value);
                        cell.classList.add(`tile-${value}`);
                    }

                    // 新出现的方块动画
                    if (newTilePos && newTilePos.r === r && newTilePos.c === c) {
                        cell.classList.add('tile-new');
                    }

                    // 合并的方块动画
                    mergedTiles.forEach(pos => {
                        if (pos.r === r && pos.c === c) {
                            cell.classList.add('tile-merged');
                        }
                    });

                    gridElement.appendChild(cell);
                }
            }
        }

        // 格式化数字
        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 10000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }

        // 移动逻辑
        function moveLeft() {
            const result = slideRow([...grid[0]]);
            let moved = false;
            const mergedTiles = [];

            for (let r = 0; r < GRID_SIZE; r++) {
                const oldRow = [...grid[r]];
                const newRow = slideRow(oldRow);
                grid[r] = newRow.row;

                if (oldRow.join(',') !== newRow.row.join(',')) {
                    moved = true;
                }

                newRow.merged.forEach(c => mergedTiles.push({ r, c }));
            }

            if (moved) {
                afterMove(mergedTiles);
            }
        }

        function moveRight() {
            let moved = false;
            const mergedTiles = [];

            for (let r = 0; r < GRID_SIZE; r++) {
                const oldRow = [...grid[r]];
                const reversed = [...oldRow].reverse();
                const newRow = slideRow(reversed);
                grid[r] = newRow.row.reverse();

                if (oldRow.join(',') !== grid[r].join(',')) {
                    moved = true;
                }

                newRow.merged.forEach(c => mergedTiles.push({ r, c: GRID_SIZE - 1 - c }));
            }

            if (moved) {
                afterMove(mergedTiles);
            }
        }

        function moveUp() {
            let moved = false;
            const mergedTiles = [];

            for (let c = 0; c < GRID_SIZE; c++) {
                const col = [];
                for (let r = 0; r < GRID_SIZE; r++) {
                    col.push(grid[r][c]);
                }

                const oldCol = [...col];
                const newCol = slideRow(col);

                for (let r = 0; r < GRID_SIZE; r++) {
                    grid[r][c] = newCol.row[r];
                }

                if (oldCol.join(',') !== newCol.row.join(',')) {
                    moved = true;
                }

                newCol.merged.forEach(r => mergedTiles.push({ r, c }));
            }

            if (moved) {
                afterMove(mergedTiles);
            }
        }

        function moveDown() {
            let moved = false;
            const mergedTiles = [];

            for (let c = 0; c < GRID_SIZE; c++) {
                const col = [];
                for (let r = 0; r < GRID_SIZE; r++) {
                    col.push(grid[r][c]);
                }

                const oldCol = [...col];
                const reversed = col.reverse();
                const newCol = slideRow(reversed);
                const newColReversed = newCol.row.reverse();

                for (let r = 0; r < GRID_SIZE; r++) {
                    grid[r][c] = newColReversed[r];
                }

                if (oldCol.join(',') !== newColReversed.join(',')) {
                    moved = true;
                }

                newCol.merged.forEach(r => mergedTiles.push({ r: GRID_SIZE - 1 - r, c }));
            }

            if (moved) {
                afterMove(mergedTiles);
            }
        }

        // 滑动一行
        function slideRow(row) {
            // 移除零
            let nonZero = row.filter(x => x !== 0);
            const merged = [];

            // 合并相同数字
            for (let i = 0; i < nonZero.length - 1; i++) {
                if (nonZero[i] === nonZero[i + 1]) {
                    nonZero[i] *= 2;
                    score += nonZero[i];
                    nonZero[i + 1] = 0;
                    merged.push(i);
                }
            }

            // 再次移除零
            nonZero = nonZero.filter(x => x !== 0);

            // 补零
            while (nonZero.length < GRID_SIZE) {
                nonZero.push(0);
            }

            return { row: nonZero, merged };
        }

        // 移动后处理
        function afterMove(mergedTiles) {
            isAnimating = true;
            updateScore();

            const newTile = addRandomTile();
            renderGrid(newTile, mergedTiles);

            setTimeout(() => {
                isAnimating = false;

                if (isGameOver()) {
                    showGameOver();
                }
            }, 150);
        }

        // 更新分数
        function updateScore() {
            scoreElement.textContent = formatNumber(score);

            if (score > bestScore) {
                bestScore = score;
                bestScoreElement.textContent = formatNumber(bestScore);
                saveBestScore();
            }
        }

        // 游戏结束检测
        function isGameOver() {
            // 检查是否有空位
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] === 0) return false;
                }
            }

            // 检查是否可以合并
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const current = grid[r][c];
                    if (c < GRID_SIZE - 1 && grid[r][c + 1] === current) return false;
                    if (r < GRID_SIZE - 1 && grid[r + 1][c] === current) return false;
                }
            }

            return true;
        }

        // 显示游戏结束
        function showGameOver() {
            finalScoreElement.textContent = formatNumber(score);
            addToLeaderboard(score);
            gameOverModal.classList.add('show');
        }

        // 本地存储 - 最高分
        function saveBestScore() {
            try {
                localStorage.setItem('2048-best-score', bestScore.toString());
            } catch (e) {
                console.warn('localStorage 不可用');
            }
        }

        function loadBestScore() {
            try {
                const saved = localStorage.getItem('2048-best-score');
                if (saved) {
                    bestScore = parseInt(saved, 10);
                    bestScoreElement.textContent = formatNumber(bestScore);
                }
            } catch (e) {
                bestScore = 0;
            }
        }

        // 本地存储 - 排行榜
        function saveLeaderboard(leaderboard) {
            try {
                localStorage.setItem('2048-leaderboard', JSON.stringify(leaderboard));
            } catch (e) {
                console.warn('localStorage 不可用');
            }
        }

        function loadLeaderboard() {
            try {
                const saved = localStorage.getItem('2048-leaderboard');
                if (saved) {
                    return JSON.parse(saved);
                }
            } catch (e) {
                console.warn('localStorage 不可用');
            }
            return [];
        }

        function addToLeaderboard(newScore) {
            if (newScore === 0) return;

            let leaderboard = loadLeaderboard();
            const today = new Date().toLocaleDateString('zh-CN');

            leaderboard.push({ score: newScore, date: today });
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 5);

            saveLeaderboard(leaderboard);
            renderLeaderboard(leaderboard);
        }

        function renderLeaderboard(leaderboard) {
            if (!leaderboard || leaderboard.length === 0) {
                leaderboardElement.innerHTML = '<li class="leaderboard-item"><span>暂无记录</span></li>';
                return;
            }

            leaderboardElement.innerHTML = leaderboard.map((item, index) => `
                <li class="leaderboard-item">
                    <span class="leaderboard-rank">#${index + 1}</span>
                    <span class="leaderboard-score">${formatNumber(item.score)}</span>
                    <span class="leaderboard-date">${item.date}</span>
                </li>
            `).join('');
        }

        // 页面加载完成后初始化
        init();
    </script>
</body>
</html>
