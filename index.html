<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机数生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            background-color: #16213e;
            padding: 40px;
            border-radius: 16px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-wrapper {
            flex: 1;
        }

        .input-wrapper label {
            display: block;
            color: #a0a0a0;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background-color: #0f3460;
            color: #ffffff;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            transition: border-color 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #e94560;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #e94560;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: filter 0.3s, transform 0.1s;
        }

        button:hover {
            filter: brightness(1.1);
        }

        button:active {
            transform: scale(0.98);
        }

        .result {
            margin-top: 30px;
            text-align: center;
        }

        .result-label {
            color: #a0a0a0;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .result-number {
            color: #e94560;
            font-size: 64px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 随机数生成器</h1>
        
        <div class="input-group">
            <div class="input-wrapper">
                <label for="min">最小值</label>
                <input type="number" id="min" value="1" placeholder="最小值">
            </div>
            <div class="input-wrapper">
                <label for="max">最大值</label>
                <input type="number" id="max" value="100" placeholder="最大值">
            </div>
        </div>

        <button onclick="generateRandom()">生成随机数</button>

        <div class="result">
            <div class="result-label">结果</div>
            <div class="result-number" id="result">-</div>
        </div>
    </div>

    <script>
        function generateRandom() {
            const minInput = document.getElementById('min');
            const maxInput = document.getElementById('max');
            const resultDisplay = document.getElementById('result');
            
            let min = parseInt(minInput.value) || 1;
            let max = parseInt(maxInput.value) || 100;
            
            // 如果最小值大于最大值，交换两者
            if (min > max) {
                [min, max] = [max, min];
                minInput.value = min;
                maxInput.value = max;
            }
            
            // 生成随机数
            const randomNum = Math.floor(Math.random() * (max - min + 1)) + min;
            
            // 显示结果（重新触发动画）
            resultDisplay.style.animation = 'none';
            resultDisplay.offsetHeight; // 触发回流
            resultDisplay.style.animation = 'fadeIn 0.3s ease-in';
            resultDisplay.textContent = randomNum;
        }

        // 按回车键也可以生成
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                generateRandom();
            }
        });
    </script>
</body>
</html>
